<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>宏全AI應用推動案例庫</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --text: #1a1d23;
    --text-muted: #5b6270;
    --border: #dfe3e8;
    --accent: #2563eb;
    --accent-soft: #eef2ff;
    --chip-bg: #eef2ff;
    --chip-text: #2c3e8f;
    --image-bg: #eceef2;
    --titlebar-bg: #e7e9ee;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
  }

  /* ---------- header ---------- */
  header {
    position: relative;
    padding: 44px 24px 26px;
    text-align: center;
  }
  .header-topright {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 6;
  }
  .lang-toggle {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
    background: var(--card-bg);
  }
  .lang-btn {
    border: none;
    background: var(--card-bg);
    color: var(--text-muted);
    font-size: 12.5px;
    font-weight: 700;
    padding: 7px 13px;
    cursor: pointer;
  }
  .lang-btn + .lang-btn { border-left: 1.5px solid var(--border); }
  .lang-btn.active { background: var(--accent); color: #fff; }
  .version-toggle { position: relative; margin: 0; }
  .version-toggle summary {
    list-style: none;
    display: inline-block;
    background: var(--chip-bg);
    color: var(--chip-text);
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
  }
  .version-toggle summary::-webkit-details-marker { display: none; }
  .changelog-box {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 300px;
    max-width: calc(100vw - 32px);
    text-align: left;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .changelog-header { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
  .changelog-list { max-height: 300px; overflow-y: auto; }
  .changelog-entry { margin-bottom: 14px; }
  .changelog-entry:last-child { margin-bottom: 0; }
  .changelog-entry .date { font-size: 13px; color: var(--text-muted); margin-bottom: 3px; font-weight: 600; }
  .changelog-entry .notes { font-size: 15px; line-height: 1.6; }
  header h1 { margin: 0 0 10px; font-size: 30px; font-weight: 800; letter-spacing: -0.01em; }
  header p { margin: 0 0 14px; color: var(--text-muted); font-size: 16px; }
  #totalCount {
    display: inline-block;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-size: 13.5px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 999px;
  }

  /* ---------- controls ---------- */
  .controls {
    max-width: 980px;
    margin: 0 auto 30px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #search {
    width: 100%;
    padding: 14px 18px;
    font-size: 17px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--card-bg);
    color: var(--text);
  }
  #search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 9px; }
  .filter-row .filter-label { font-size: 14px; color: var(--text-muted); margin-right: 2px; font-weight: 600; }
  .tag-btn {
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .tag-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tag-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ---------- grid / cards ---------- */
  main { max-width: 980px; margin: 0 auto; padding: 0 20px 60px; }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .card:hover { border-color: var(--accent); }
  .card .browser-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--titlebar-bg);
    border-bottom: 1.5px solid var(--border);
  }
  .card .traffic-lights { display: flex; gap: 6px; flex-shrink: 0; }
  .card .dot { width: 10px; height: 10px; border-radius: 50%; }
  .card .dot.red { background: #ff5f57; }
  .card .dot.yellow { background: #febc2e; }
  .card .dot.green { background: #28c840; }
  .card .url-pill {
    flex: 1;
    background: var(--card-bg);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card .thumb {
    width: 100%;
    height: 180px;
    background: var(--image-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card .thumb img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .card .thumb .placeholder { color: var(--text-muted); font-size: 14px; }
  .card .body { padding: 18px; display: flex; flex-direction: column; gap: 9px; flex: 1; }
  .card .type-badge {
    display: inline-block;
    align-self: flex-start;
    background: var(--chip-bg);
    color: var(--chip-text);
    font-size: 12.5px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
  }
  .card h3 { margin: 0; font-size: 18px; font-weight: 700; line-height: 1.35; }
  .card .summary {
    font-size: 14.5px;
    color: var(--text-muted);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .meta { font-size: 13.5px; color: var(--text-muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { background: var(--chip-bg); color: var(--chip-text); font-size: 13px; font-weight: 600; padding: 4px 11px; border-radius: 999px; }
  #empty { text-align: center; color: var(--text-muted); font-size: 16px; padding: 60px 0; display: none; }

  /* ---------- detail view (full page, no overlay) ---------- */
  #detailView { max-width: 760px; margin: 0 auto; padding: 0 20px 64px; }
  .detail-topbar { position: sticky; top: 0; background: var(--bg); padding: 16px 0; z-index: 5; }
  #backBtn {
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  #backBtn:hover { border-color: var(--accent); color: var(--accent); }

  .hero {
    width: 100%;
    max-height: 60vh;
    background: var(--image-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .hero img { max-width: 100%; max-height: 60vh; object-fit: contain; display: block; }

  #detailContent h2 { margin: 0 0 8px; font-size: 26px; line-height: 1.4; font-weight: 800; }
  #detailContent .subtitle { color: var(--text-muted); font-size: 16.5px; line-height: 1.65; margin-bottom: 20px; }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 22px;
  }
  .meta-grid div { font-size: 15px; }
  .meta-grid label { display: block; font-size: 12.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.02em; }

  .field { margin-bottom: 26px; }
  .field label {
    display: block;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 10px;
  }
  .field .text { font-size: 16px; line-height: 1.8; white-space: pre-line; }
  .field ol { margin: 0; padding-left: 22px; font-size: 16px; line-height: 1.8; }
  .field ol li { margin-bottom: 6px; }
  .field a { color: var(--accent); word-break: break-all; font-size: 16px; }

  @media (max-width: 600px) {
    header { padding: 52px 16px 22px; }
    header h1 { font-size: 24px; }
    .controls, main, #detailView { padding-left: 16px; padding-right: 16px; }
    #grid { grid-template-columns: 1fr; gap: 16px; }
    .card .thumb { height: 200px; }
    #detailContent h2 { font-size: 21px; }
    .meta-grid { grid-template-columns: repeat(2, 1fr); }
    .hero, .hero img { max-height: 45vh; }
  }
</style>
</head>
<body>

<section id="listView">
  <header>
    <div class="header-topright">
      <div class="lang-toggle">
        <button class="lang-btn" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <details class="version-toggle" id="changelogDetails">
        <summary id="versionBadge">v1.0.0</summary>
        <div class="changelog-box">
          <div class="changelog-header" id="changelogHeader"></div>
          <div class="changelog-list" id="changelogContent"></div>
        </div>
      </details>
    </div>
    <h1 id="pageTitle">宏全AI應用推動案例庫</h1>
    <p id="pageSubtitle">分享用 AI 或自動化工具解決廠內流程問題的實際案例</p>
    <span id="totalCount"></span>
  </header>

  <div class="controls">
    <input id="search" type="text" placeholder="搜尋標題、問題、工具、製作人、關鍵字..." />
    <div class="filter-row" id="categoryFilters"></div>
  </div>

  <main>
    <div id="grid"></div>
    <div id="empty">找不到符合的案例</div>
  </main>
</section>

<section id="detailView" hidden>
  <div class="detail-topbar">
    <button id="backBtn">← 返回案例庫</button>
  </div>
  <div id="detailContent"></div>
</section>

<script>
let cases = [];
let changelogData = null;
let activeCategory = null;
let currentLang = localStorage.getItem('caseLibLang') || 'zh';

const UI_STRINGS = {
  zh: {
    pageTitle: '宏全AI應用推動案例庫',
    subtitle: '分享用 AI 或自動化工具解決廠內流程問題的實際案例',
    searchPlaceholder: '搜尋標題、問題、工具、製作人、關鍵字...',
    filterLabel: '分類',
    all: '全部',
    empty: '找不到符合的案例',
    totalCount: (n) => `共收錄 ${n} 個案例`,
    authorLabel: '製作人',
    ownerLabel: '負責單位',
    noScreenshot: '尚無畫面',
    noUrl: '尚無網站連結',
    backBtn: '← 返回案例庫',
    currentVersion: '目前版本',
    notProvided: '未提供',
    listSep: '、',
    colon: '：',
    divider: ' ｜ '
  },
  en: {
    pageTitle: 'Hon Chuan AI Application Case Library',
    subtitle: 'Real cases of using AI or automation tools to solve in-plant process problems',
    searchPlaceholder: 'Search title, problem, tool, author, keyword...',
    filterLabel: 'Category',
    all: 'All',
    empty: 'No matching cases found',
    totalCount: (n) => `${n} cases collected`,
    authorLabel: 'Author',
    ownerLabel: 'Owning Unit',
    noScreenshot: 'No screenshot yet',
    noUrl: 'No website link yet',
    backBtn: '← Back to Case Library',
    currentVersion: 'Current Version',
    notProvided: 'Not provided',
    listSep: ', ',
    colon: ': ',
    divider: ' | '
  }
};

const FIELD_LABELS = {
  category: { zh: '案例分類', en: 'Category' },
  unit_request: { zh: '需求單位', en: 'Requesting Unit' },
  unit_owner: { zh: '負責單位', en: 'Owning Unit' },
  author: { zh: '案例負責人', en: 'Case Owner' },
  status: { zh: '案例狀態', en: 'Status' },
  region: { zh: '適用地區', en: 'Region' },
  url: { zh: '網站連結', en: 'Website Link' },
  problem_background: { zh: '問題背景', en: 'Background' },
  core_problem: { zh: '核心問題', en: 'Core Problem' },
  solution: { zh: '解決方案', en: 'Solution' },
  process: { zh: '執行流程', en: 'Process' },
  features: { zh: '主要功能', en: 'Key Features' },
  ai_usage: { zh: 'AI 的應用方式', en: 'How AI Was Used' },
  tools: { zh: '使用工具', en: 'Tools Used' },
  results: { zh: '執行成果', en: 'Results' },
  value: { zh: '產生價值', en: 'Value Created' },
  extensions: { zh: '可複製與延伸應用', en: 'Reusable & Extended Applications' },
  limitations: { zh: '使用限制與注意事項', en: 'Limitations & Notes' },
  success_key: { zh: '成功關鍵', en: 'Key to Success' },
  keywords: { zh: '案例關鍵字', en: 'Keywords' }
};

function ui() { return UI_STRINGS[currentLang]; }
function flabel(key) { return FIELD_LABELS[key][currentLang]; }
function loc(c) { return c.i18n[currentLang] || c.i18n.zh; }

async function load() {
  const [casesRes, changelogRes] = await Promise.all([
    fetch('data/cases.json'),
    fetch('data/changelog.json')
  ]);
  cases = await casesRes.json();
  changelogData = await changelogRes.json();
  applyStaticText();
  renderVersion();
  renderCategoryFilters();
  render();
  routeFromHash();
}

function applyStaticText() {
  const s = ui();
  document.title = s.pageTitle;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hant' : 'en';
  document.getElementById('pageTitle').textContent = s.pageTitle;
  document.getElementById('pageSubtitle').textContent = s.subtitle;
  document.getElementById('search').placeholder = s.searchPlaceholder;
  document.getElementById('empty').textContent = s.empty;
  document.getElementById('backBtn').textContent = s.backBtn;
  if (cases.length) {
    document.getElementById('totalCount').textContent = s.totalCount(cases.length);
  }
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });
}

function setLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  localStorage.setItem('caseLibLang', lang);
  activeCategory = null;
  applyStaticText();
  renderVersion();
  renderCategoryFilters();
  render();
  routeFromHash();
}

function domainFromUrl(url) {
  if (!url) return ui().noUrl;
  try {
    const u = new URL(url);
    const path = u.pathname.replace(/\/$/, '');
    return u.hostname + path;
  } catch (e) {
    return url;
  }
}

function renderVersion() {
  if (!changelogData) return;
  document.getElementById('versionBadge').textContent = changelogData.version;
  document.getElementById('changelogHeader').innerHTML =
    `<div class="date">${escapeHtml(ui().currentVersion)}</div><div class="notes">${escapeHtml(changelogData.version)}</div>`;
  const content = document.getElementById('changelogContent');
  content.innerHTML = changelogData.entries.map(e => `
      <div class="changelog-entry">
        <div class="date">${escapeHtml(e.date)}</div>
        <div class="notes">${escapeHtml(e.notes)}</div>
      </div>
    `).join('');
}

/* ---------- 通用資料工具：容忍每筆案例欄位形狀不同（字串 / 陣列 / 成對物件） ---------- */

function isEmpty(v) {
  if (v == null) return true;
  if (Array.isArray(v)) return v.length === 0;
  if (typeof v === 'string') return v.trim() === '';
  return false;
}

function itemLabel(item) {
  return typeof item === 'string' ? item : (item.name || '');
}

function renderListItems(items) {
  return `<ol>${items.map(i => {
    if (typeof i === 'string') return `<li>${escapeHtml(i)}</li>`;
    return `<li><strong>${escapeHtml(i.name || '')}</strong>${i.desc ? ui().colon + escapeHtml(i.desc) : ''}</li>`;
  }).join('')}</ol>`;
}

function renderContent(val) {
  if (isEmpty(val)) return null;
  if (typeof val === 'string') return `<div class="text">${escapeHtml(val)}</div>`;
  if (Array.isArray(val)) return renderListItems(val);
  return null;
}

function field(key, val) {
  const html = renderContent(val);
  if (!html) return '';
  return `<div class="field"><label>${escapeHtml(flabel(key))}</label>${html}</div>`;
}

function chipsField(key, items) {
  if (isEmpty(items)) return '';
  return `<div class="field"><label>${escapeHtml(flabel(key))}</label><div class="chips">${items.map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div></div>`;
}

/* ---------- 分類篩選 + 搜尋 ---------- */

function allCategories() {
  const s = new Set();
  cases.forEach(c => (loc(c).category || []).forEach(t => s.add(t)));
  return [...s];
}

function renderCategoryFilters() {
  const el = document.getElementById('categoryFilters');
  el.innerHTML = `<span class="filter-label">${escapeHtml(ui().filterLabel)}</span>`;

  const allBtn = document.createElement('button');
  allBtn.className = 'tag-btn';
  allBtn.textContent = ui().all;
  allBtn.onclick = () => {
    activeCategory = null;
    renderCategoryFilters();
    render();
  };
  if (activeCategory === null) allBtn.classList.add('active');
  el.appendChild(allBtn);

  allCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = cat;
    btn.onclick = () => {
      activeCategory = activeCategory === cat ? null : cat;
      renderCategoryFilters();
      render();
    };
    if (activeCategory === cat) btn.classList.add('active');
    el.appendChild(btn);
  });
}

function matches(c, q) {
  const lc = loc(c);
  if (activeCategory && !(lc.category || []).includes(activeCategory)) return false;
  if (!q) return true;
  const toolNames = (lc.tools || []).map(itemLabel);
  const haystack = [
    lc.title, lc.summary, lc.problem_background, lc.core_problem, lc.solution,
    lc.author, lc.unit_request, lc.unit_owner,
    ...(lc.category || []), ...toolNames, ...(lc.keywords || [])
  ].join(' ').toLowerCase();
  return haystack.includes(q.toLowerCase());
}

function render() {
  const q = document.getElementById('search').value.trim();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const filtered = cases.filter(c => matches(c, q));
  grid.innerHTML = '';
  empty.style.display = filtered.length ? 'none' : 'block';
  filtered.forEach(c => grid.appendChild(renderCard(c)));
}

function renderCard(c) {
  const lc = loc(c);
  const s = ui();
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => { location.hash = 'case/' + encodeURIComponent(c.id); };

  const browserBar = document.createElement('div');
  browserBar.className = 'browser-bar';
  browserBar.innerHTML = `
    <div class="traffic-lights"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
    <div class="url-pill">${escapeHtml(domainFromUrl(c.url))}</div>
  `;

  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  if (c.screenshot) {
    thumb.innerHTML = `<img src="${c.screenshot}" alt="${escapeHtml(lc.title)}" loading="lazy" />`;
  } else {
    thumb.innerHTML = `<span class="placeholder">${escapeHtml(s.noScreenshot)}</span>`;
  }

  const body = document.createElement('div');
  body.className = 'body';
  body.innerHTML = `
    <h3>${escapeHtml(lc.title)}</h3>
    <div class="type-badge">${(lc.category || []).map(escapeHtml).join(s.listSep)}</div>
    <div class="summary">${escapeHtml(lc.summary || '')}</div>
    <div class="chips">${(lc.tools||[]).map(itemLabel).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>
    <div class="meta">${escapeHtml(s.authorLabel)}${s.colon}${escapeHtml(lc.author || s.notProvided)}${lc.unit_owner ? `${s.divider}${escapeHtml(s.ownerLabel)}${s.colon}${escapeHtml(lc.unit_owner)}` : ''}</div>
  `;

  card.appendChild(browserBar);
  card.appendChild(thumb);
  card.appendChild(body);
  return card;
}

/* ---------- 詳情頁（全頁切換，非覆蓋層） ---------- */

function renderDetail(c) {
  const lc = loc(c);
  const content = document.getElementById('detailContent');

  const metaItems = [
    [flabel('category'), (lc.category || []).join(ui().listSep)],
    [flabel('unit_request'), lc.unit_request],
    [flabel('unit_owner'), lc.unit_owner],
    [flabel('author'), lc.author],
    [flabel('status'), lc.status],
    [flabel('region'), lc.region],
  ].filter(([, v]) => !isEmpty(v));

  content.innerHTML = `
    ${c.screenshot ? `<div class="hero"><img src="${c.screenshot}" alt="${escapeHtml(lc.title)}" /></div>` : ''}
    <h2>${escapeHtml(lc.title)}</h2>
    <div class="subtitle">${escapeHtml(lc.summary || '')}</div>

    ${metaItems.length ? `<div class="meta-grid">${metaItems.map(([label, v]) => `<div><label>${escapeHtml(label)}</label>${escapeHtml(v)}</div>`).join('')}</div>` : ''}

    ${c.url ? `<div class="field"><label>${escapeHtml(flabel('url'))}</label><div class="text"><a href="${c.url}" target="_blank" rel="noopener">${escapeHtml(c.url)}</a></div></div>` : ''}
    ${field('problem_background', lc.problem_background)}
    ${field('core_problem', lc.core_problem)}
    ${field('solution', lc.solution)}
    ${field('process', lc.process)}
    ${field('features', lc.features)}
    ${field('ai_usage', lc.ai_usage)}
    ${field('tools', lc.tools)}
    ${field('results', lc.results)}
    ${field('value', lc.value)}
    ${chipsField('extensions', lc.extensions)}
    ${field('limitations', lc.limitations)}
    ${field('success_key', lc.success_key)}
    ${chipsField('keywords', lc.keywords)}
  `;
}

function showList() {
  document.getElementById('listView').hidden = false;
  document.getElementById('detailView').hidden = true;
  window.scrollTo(0, 0);
}

function showDetail(id) {
  const c = cases.find(x => x.id === id);
  if (!c) { showList(); return; }
  renderDetail(c);
  document.getElementById('listView').hidden = true;
  document.getElementById('detailView').hidden = false;
  window.scrollTo(0, 0);
}

function routeFromHash() {
  const m = location.hash.match(/^#case\/(.+)$/);
  if (m) showDetail(decodeURIComponent(m[1]));
  else showList();
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('backBtn').addEventListener('click', () => { location.hash = ''; });
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});
window.addEventListener('hashchange', routeFromHash);

load();
</script>

</body>
</html>
