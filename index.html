<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI / 自動化案例庫</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --text: #1a1d23;
    --text-muted: #5b6270;
    --border: #dfe3e8;
    --accent: #2563eb;
    --accent-soft: #eef2ff;
    --chip-bg: #eef2ff;
    --chip-text: #2c3e8f;
    --image-bg: #eceef2;
    --titlebar-bg: #e7e9ee;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
  }

  /* ---------- header ---------- */
  header {
    position: relative;
    padding: 44px 24px 26px;
    text-align: center;
  }
  .version-toggle {
    position: absolute;
    top: 16px;
    right: 16px;
    margin: 0;
    z-index: 6;
  }
  .version-toggle summary {
    list-style: none;
    display: inline-block;
    background: var(--chip-bg);
    color: var(--chip-text);
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
  }
  .version-toggle summary::-webkit-details-marker { display: none; }
  .changelog-box {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 300px;
    max-width: calc(100vw - 32px);
    text-align: left;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .changelog-entry { margin-bottom: 14px; }
  .changelog-entry:last-child { margin-bottom: 0; }
  .changelog-entry .date { font-size: 13px; color: var(--text-muted); margin-bottom: 3px; font-weight: 600; }
  .changelog-entry .notes { font-size: 15px; line-height: 1.6; }
  header h1 { margin: 0 0 10px; font-size: 30px; font-weight: 800; letter-spacing: -0.01em; }
  header p { margin: 0 0 14px; color: var(--text-muted); font-size: 16px; }
  #totalCount {
    display: inline-block;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-size: 13.5px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 999px;
  }

  /* ---------- controls ---------- */
  .controls {
    max-width: 980px;
    margin: 0 auto 30px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #search {
    width: 100%;
    padding: 14px 18px;
    font-size: 17px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--card-bg);
    color: var(--text);
  }
  #search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 9px; }
  .filter-row .filter-label { font-size: 14px; color: var(--text-muted); margin-right: 2px; font-weight: 600; }
  .tag-btn {
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .tag-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tag-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ---------- grid / cards ---------- */
  main { max-width: 980px; margin: 0 auto; padding: 0 20px 60px; }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .card:hover { border-color: var(--accent); }
  .card .browser-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--titlebar-bg);
    border-bottom: 1.5px solid var(--border);
  }
  .card .traffic-lights { display: flex; gap: 6px; flex-shrink: 0; }
  .card .dot { width: 10px; height: 10px; border-radius: 50%; }
  .card .dot.red { background: #ff5f57; }
  .card .dot.yellow { background: #febc2e; }
  .card .dot.green { background: #28c840; }
  .card .url-pill {
    flex: 1;
    background: var(--card-bg);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card .thumb {
    width: 100%;
    height: 180px;
    background: var(--image-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card .thumb img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .card .thumb .placeholder { color: var(--text-muted); font-size: 14px; }
  .card .body { padding: 18px; display: flex; flex-direction: column; gap: 9px; flex: 1; }
  .card .type-badge {
    display: inline-block;
    align-self: flex-start;
    background: var(--chip-bg);
    color: var(--chip-text);
    font-size: 12.5px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
  }
  .card h3 { margin: 0; font-size: 18px; font-weight: 700; line-height: 1.35; }
  .card .summary {
    font-size: 14.5px;
    color: var(--text-muted);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .meta { font-size: 13.5px; color: var(--text-muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { background: var(--chip-bg); color: var(--chip-text); font-size: 13px; font-weight: 600; padding: 4px 11px; border-radius: 999px; }
  #empty { text-align: center; color: var(--text-muted); font-size: 16px; padding: 60px 0; display: none; }

  /* ---------- detail view (full page, no overlay) ---------- */
  #detailView { max-width: 760px; margin: 0 auto; padding: 0 20px 64px; }
  .detail-topbar { position: sticky; top: 0; background: var(--bg); padding: 16px 0; z-index: 5; }
  #backBtn {
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  #backBtn:hover { border-color: var(--accent); color: var(--accent); }

  .hero {
    width: 100%;
    max-height: 60vh;
    background: var(--image-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .hero img { max-width: 100%; max-height: 60vh; object-fit: contain; display: block; }

  #detailContent h2 { margin: 0 0 8px; font-size: 26px; line-height: 1.4; font-weight: 800; }
  #detailContent .subtitle { color: var(--text-muted); font-size: 16.5px; line-height: 1.65; margin-bottom: 20px; }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 22px;
  }
  .meta-grid div { font-size: 15px; }
  .meta-grid label { display: block; font-size: 12.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.02em; }

  .field { margin-bottom: 22px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 8px;
  }
  .field .text { font-size: 16px; line-height: 1.8; white-space: pre-line; }
  .field ol { margin: 0; padding-left: 22px; font-size: 16px; line-height: 1.8; }
  .field ol li { margin-bottom: 6px; }
  .field a { color: var(--accent); word-break: break-all; font-size: 16px; }

  @media (max-width: 600px) {
    header { padding: 52px 16px 22px; }
    header h1 { font-size: 24px; }
    .controls, main, #detailView { padding-left: 16px; padding-right: 16px; }
    #grid { grid-template-columns: 1fr; gap: 16px; }
    .card .thumb { height: 200px; }
    #detailContent h2 { font-size: 21px; }
    .meta-grid { grid-template-columns: repeat(2, 1fr); }
    .hero, .hero img { max-height: 45vh; }
  }
</style>
</head>
<body>

<section id="listView">
  <header>
    <details class="version-toggle" id="changelogDetails">
      <summary id="versionBadge">v1.0.0</summary>
      <div class="changelog-box" id="changelogContent"></div>
    </details>
    <h1>AI / 自動化案例庫</h1>
    <p>分享用 AI 或自動化工具解決廠內流程問題的實際案例</p>
    <span id="totalCount"></span>
  </header>

  <div class="controls">
    <input id="search" type="text" placeholder="搜尋標題、問題、工具、製作人、關鍵字..." />
    <div class="filter-row" id="categoryFilters"></div>
  </div>

  <main>
    <div id="grid"></div>
    <div id="empty">找不到符合的案例</div>
  </main>
</section>

<section id="detailView" hidden>
  <div class="detail-topbar">
    <button id="backBtn">← 返回案例庫</button>
  </div>
  <div id="detailContent"></div>
</section>

<script>
let cases = [];
let activeCategory = null;

async function load() {
  const [casesRes, changelogRes] = await Promise.all([
    fetch('data/cases.json'),
    fetch('data/changelog.json')
  ]);
  cases = await casesRes.json();
  const changelog = await changelogRes.json();
  renderVersion(changelog);
  renderCategoryFilters();
  document.getElementById('totalCount').textContent = `共收錄 ${cases.length} 個案例`;
  render();
  routeFromHash();
}

function domainFromUrl(url) {
  if (!url) return '尚無網站連結';
  try {
    const u = new URL(url);
    const path = u.pathname.replace(/\/$/, '');
    return u.hostname + path;
  } catch (e) {
    return url;
  }
}

function renderVersion(changelog) {
  document.getElementById('versionBadge').textContent = changelog.version;
  const content = document.getElementById('changelogContent');
  content.innerHTML = `<div class="changelog-entry"><div class="date">目前版本</div><div class="notes">${escapeHtml(changelog.version)}</div></div>` +
    changelog.entries.map(e => `
      <div class="changelog-entry">
        <div class="date">${escapeHtml(e.date)}</div>
        <div class="notes">${escapeHtml(e.notes)}</div>
      </div>
    `).join('');
}

/* ---------- 通用資料工具：容忍每筆案例欄位形狀不同（字串 / 陣列 / 成對物件） ---------- */

function isEmpty(v) {
  if (v == null) return true;
  if (Array.isArray(v)) return v.length === 0;
  if (typeof v === 'string') return v.trim() === '';
  return false;
}

function itemLabel(item) {
  return typeof item === 'string' ? item : (item.name || '');
}

function renderListItems(items) {
  return `<ol>${items.map(i => {
    if (typeof i === 'string') return `<li>${escapeHtml(i)}</li>`;
    return `<li><strong>${escapeHtml(i.name || '')}</strong>${i.desc ? '：' + escapeHtml(i.desc) : ''}</li>`;
  }).join('')}</ol>`;
}

function renderContent(val) {
  if (isEmpty(val)) return null;
  if (typeof val === 'string') return `<div class="text">${escapeHtml(val)}</div>`;
  if (Array.isArray(val)) return renderListItems(val);
  return null;
}

function field(label, val) {
  const html = renderContent(val);
  if (!html) return '';
  return `<div class="field"><label>${escapeHtml(label)}</label>${html}</div>`;
}

function chipsField(label, items) {
  if (isEmpty(items)) return '';
  return `<div class="field"><label>${escapeHtml(label)}</label><div class="chips">${items.map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div></div>`;
}

/* ---------- 分類篩選 + 搜尋 ---------- */

function allCategories() {
  const s = new Set();
  cases.forEach(c => (c.category || []).forEach(t => s.add(t)));
  return [...s];
}

function renderCategoryFilters() {
  const el = document.getElementById('categoryFilters');
  el.innerHTML = '<span class="filter-label">分類</span>';
  allCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = cat;
    btn.onclick = () => {
      activeCategory = activeCategory === cat ? null : cat;
      renderCategoryFilters();
      render();
    };
    if (activeCategory === cat) btn.classList.add('active');
    el.appendChild(btn);
  });
}

function matches(c, q) {
  if (activeCategory && !(c.category || []).includes(activeCategory)) return false;
  if (!q) return true;
  const toolNames = (c.tools || []).map(itemLabel);
  const haystack = [
    c.title, c.summary, c.problem_background, c.core_problem, c.solution,
    c.author, c.unit_request, c.unit_owner,
    ...(c.category || []), ...toolNames, ...(c.keywords || [])
  ].join(' ').toLowerCase();
  return haystack.includes(q.toLowerCase());
}

function render() {
  const q = document.getElementById('search').value.trim();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const filtered = cases.filter(c => matches(c, q));
  grid.innerHTML = '';
  empty.style.display = filtered.length ? 'none' : 'block';
  filtered.forEach(c => grid.appendChild(renderCard(c)));
}

function renderCard(c) {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => { location.hash = 'case/' + encodeURIComponent(c.id); };

  const browserBar = document.createElement('div');
  browserBar.className = 'browser-bar';
  browserBar.innerHTML = `
    <div class="traffic-lights"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
    <div class="url-pill">${escapeHtml(domainFromUrl(c.url))}</div>
  `;

  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  if (c.screenshot) {
    thumb.innerHTML = `<img src="${c.screenshot}" alt="${escapeHtml(c.title)}" loading="lazy" />`;
  } else {
    thumb.innerHTML = `<span class="placeholder">尚無畫面</span>`;
  }

  const body = document.createElement('div');
  body.className = 'body';
  body.innerHTML = `
    <h3>${escapeHtml(c.title)}</h3>
    <div class="type-badge">${(c.category || []).map(escapeHtml).join('、')}</div>
    <div class="summary">${escapeHtml(c.summary || '')}</div>
    <div class="chips">${(c.tools||[]).map(itemLabel).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>
    <div class="meta">製作人：${escapeHtml(c.author || '未提供')}${c.unit_owner ? ` ｜ 負責單位：${escapeHtml(c.unit_owner)}` : ''}</div>
  `;

  card.appendChild(browserBar);
  card.appendChild(thumb);
  card.appendChild(body);
  return card;
}

/* ---------- 詳情頁（全頁切換，非覆蓋層） ---------- */

function renderDetail(c) {
  const content = document.getElementById('detailContent');

  const metaItems = [
    ['案例分類', (c.category || []).join('、')],
    ['需求單位', c.unit_request],
    ['負責單位', c.unit_owner],
    ['案例負責人', c.author],
    ['案例狀態', c.status],
    ['適用地區', c.region],
  ].filter(([, v]) => !isEmpty(v));

  content.innerHTML = `
    ${c.screenshot ? `<div class="hero"><img src="${c.screenshot}" alt="${escapeHtml(c.title)}" /></div>` : ''}
    <h2>${escapeHtml(c.title)}</h2>
    <div class="subtitle">${escapeHtml(c.summary || '')}</div>

    ${metaItems.length ? `<div class="meta-grid">${metaItems.map(([label, v]) => `<div><label>${escapeHtml(label)}</label>${escapeHtml(v)}</div>`).join('')}</div>` : ''}

    ${c.url ? `<div class="field"><label>網站連結</label><div class="text"><a href="${c.url}" target="_blank" rel="noopener">${escapeHtml(c.url)}</a></div></div>` : ''}
    ${field('問題背景', c.problem_background)}
    ${field('核心問題', c.core_problem)}
    ${field('解決方案', c.solution)}
    ${field('執行流程', c.process)}
    ${field('主要功能', c.features)}
    ${field('AI 的應用方式', c.ai_usage)}
    ${field('使用工具', c.tools)}
    ${field('執行成果', c.results)}
    ${field('產生價值', c.value)}
    ${chipsField('可複製與延伸應用', c.extensions)}
    ${field('使用限制與注意事項', c.limitations)}
    ${field('成功關鍵', c.success_key)}
    ${chipsField('案例關鍵字', c.keywords)}
  `;
}

function showList() {
  document.getElementById('listView').hidden = false;
  document.getElementById('detailView').hidden = true;
  window.scrollTo(0, 0);
}

function showDetail(id) {
  const c = cases.find(x => x.id === id);
  if (!c) { showList(); return; }
  renderDetail(c);
  document.getElementById('listView').hidden = true;
  document.getElementById('detailView').hidden = false;
  window.scrollTo(0, 0);
}

function routeFromHash() {
  const m = location.hash.match(/^#case\/(.+)$/);
  if (m) showDetail(decodeURIComponent(m[1]));
  else showList();
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('backBtn').addEventListener('click', () => { location.hash = ''; });
window.addEventListener('hashchange', routeFromHash);

load();
</script>

</body>
</html>
