<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI / 自動化案例庫</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --text: #1a1d23;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --accent: #2563eb;
    --accent-soft: #eef2ff;
    --chip-bg: #eef2ff;
    --chip-text: #3730a3;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a;
      --card-bg: #1d2026;
      --text: #e7e9ec;
      --text-muted: #9aa0aa;
      --border: #2c2f36;
      --accent: #6d8bff;
      --accent-soft: #232945;
      --chip-bg: #232945;
      --chip-text: #a9b8ff;
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.24);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 48px 24px 32px;
    text-align: center;
  }
  header h1 {
    margin: 0 0 8px;
    font-size: 28px;
    font-weight: 700;
  }
  header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 15px;
  }
  .controls {
    max-width: 960px;
    margin: 0 auto 32px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #search {
    width: 100%;
    padding: 12px 16px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--text);
  }
  #search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  #tagFilters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag-btn {
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .tag-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tag-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 64px;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.1);
  }
  .card .thumb {
    width: 100%;
    aspect-ratio: 16/10;
    background: var(--accent-soft) center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .card .body { padding: 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .card h3 { margin: 0; font-size: 16px; font-weight: 600; }
  .card .problem {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: auto;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--chip-bg);
    color: var(--chip-text);
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
  }
  #empty {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 0;
    display: none;
  }
  /* modal */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 10;
  }
  #overlay.open { display: flex; }
  #modal {
    background: var(--card-bg);
    color: var(--text);
    max-width: 640px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    border-radius: 16px;
    padding: 28px;
    position: relative;
  }
  #modal img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 16px;
    display: block;
  }
  #modal h2 { margin: 0 0 12px; font-size: 20px; }
  #modal .field { margin-bottom: 14px; }
  #modal .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
  }
  #modal .field div, #modal .field a { font-size: 14px; line-height: 1.6; }
  #modal a { color: var(--accent); }
  #closeBtn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header>
  <h1>AI / 自動化案例庫</h1>
  <p>分享用 AI 或自動化工具解決廠內流程問題的實際案例</p>
</header>

<div class="controls">
  <input id="search" type="text" placeholder="搜尋標題、問題、工具、製作人..." />
  <div id="tagFilters"></div>
</div>

<main>
  <div id="grid"></div>
  <div id="empty">找不到符合的案例</div>
</main>

<div id="overlay">
  <div id="modal">
    <button id="closeBtn" aria-label="關閉">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
let cases = [];
let activeTag = null;

async function load() {
  const res = await fetch('data/cases.json');
  cases = await res.json();
  renderTags();
  render();
}

function allTags() {
  const s = new Set();
  cases.forEach(c => (c.tags || []).forEach(t => s.add(t)));
  return [...s];
}

function renderTags() {
  const el = document.getElementById('tagFilters');
  el.innerHTML = '';
  allTags().forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = tag;
    btn.onclick = () => {
      activeTag = activeTag === tag ? null : tag;
      renderTags();
      render();
    };
    if (activeTag === tag) btn.classList.add('active');
    el.appendChild(btn);
  });
}

function matches(c, q) {
  if (activeTag && !(c.tags || []).includes(activeTag)) return false;
  if (!q) return true;
  const haystack = [c.title, c.problem, c.design, c.author, ...(c.tools||[]), ...(c.tags||[])]
    .join(' ').toLowerCase();
  return haystack.includes(q.toLowerCase());
}

function render() {
  const q = document.getElementById('search').value.trim();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const filtered = cases.filter(c => matches(c, q));
  grid.innerHTML = '';
  empty.style.display = filtered.length ? 'none' : 'block';
  filtered.forEach(c => grid.appendChild(renderCard(c)));
}

function renderCard(c) {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => openModal(c);

  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  if (c.screenshot) {
    thumb.style.backgroundImage = `url(${c.screenshot})`;
  } else {
    thumb.textContent = '尚無畫面';
  }

  const body = document.createElement('div');
  body.className = 'body';
  body.innerHTML = `
    <h3>${escapeHtml(c.title)}</h3>
    <div class="problem">${escapeHtml(c.problem || '')}</div>
    <div class="chips">${(c.tools||[]).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>
    <div class="meta">製作人：${escapeHtml(c.author || '未提供')}</div>
  `;

  card.appendChild(thumb);
  card.appendChild(body);
  return card;
}

function openModal(c) {
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    ${c.screenshot ? `<img src="${c.screenshot}" alt="${escapeHtml(c.title)}" />` : ''}
    <h2>${escapeHtml(c.title)}</h2>
    <div class="field">
      <label>網址</label>
      <div>${c.url ? `<a href="${c.url}" target="_blank" rel="noopener">${escapeHtml(c.url)}</a>` : '未提供'}</div>
    </div>
    <div class="field">
      <label>製作人</label>
      <div>${escapeHtml(c.author || '未提供')}</div>
    </div>
    <div class="field">
      <label>使用工具</label>
      <div class="chips">${(c.tools||[]).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>
    </div>
    <div class="field">
      <label>解決問題</label>
      <div>${escapeHtml(c.problem || '未提供')}</div>
    </div>
    <div class="field">
      <label>設計架構思路</label>
      <div>${escapeHtml(c.design || '未提供')}</div>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', (e) => {
  if (e.target.id === 'overlay') closeModal();
});

load();
</script>

</body>
</html>
